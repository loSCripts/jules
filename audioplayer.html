<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎵 AUDIO VAULT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #18181f;
    --border: #2a2a38;
    --accent: #e8ff3c;
    --accent2: #ff3cf0;
    --text: #f0f0f8;
    --muted: #6b6b82;
    --playing: #e8ff3c;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .track-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
  }

  /* UPLOAD ZONE */
  .upload-zone {
    position: relative;
    z-index: 1;
    margin: 2rem 2rem 0;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(232,255,60,0.02);
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232,255,60,0.06);
  }
  .upload-zone.drag-over { transform: scale(1.01); }

  .upload-zone input { display: none; }

  .upload-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    display: block;
  }
  .upload-zone h2 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .upload-zone p {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .upload-zone .formats {
    margin-top: 0.75rem;
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .format-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    background: rgba(232,255,60,0.1);
    border: 1px solid rgba(232,255,60,0.25);
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
  }

  /* CONTROLS BAR */
  .controls-bar {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 2rem;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    padding: 0.6rem 1rem 0.6rem 2.5rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before {
    content: '⌕';
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1.1rem;
    pointer-events: none;
  }

  .sort-btn, .shuffle-btn, .clear-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .sort-btn:hover, .shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }
  .clear-btn:hover { border-color: #ff4444; color: #ff4444; }

  /* MAIN LAYOUT */
  .main {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1.5rem;
    padding: 0 2rem 8rem;
    flex: 1;
  }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sticky-player { position: relative; top: auto; }
  }

  /* TRACK LIST */
  .track-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state .big-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.82rem; font-family: 'JetBrains Mono', monospace; }

  .track-item {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: center;
    gap: 0.75rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.3s ease forwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .track-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.2s;
  }
  .track-item:hover::before { transform: scaleY(1); }
  .track-item:hover { border-color: var(--border); background: #1e1e28; transform: translateX(3px); }
  .track-item.active {
    border-color: rgba(232,255,60,0.35);
    background: rgba(232,255,60,0.05);
  }
  .track-item.active::before { transform: scaleY(1); }

  .track-num {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    background: var(--surface);
    border-radius: 8px;
    flex-shrink: 0;
    transition: all 0.2s;
    position: relative;
  }
  .track-item.active .track-num {
    background: var(--accent);
    color: #000;
  }
  .track-item.active .track-num .num-label { display: none; }
  .track-item.active .track-num::after {
    content: '';
    display: flex;
    gap: 2px;
  }
  /* bars animation */
  .bars {
    display: none;
    gap: 2px;
    align-items: flex-end;
    height: 20px;
  }
  .track-item.active.is-playing .bars { display: flex; }
  .track-item.active.is-playing .num-label { display: none; }
  .bars span {
    display: block;
    width: 3px;
    background: #000;
    border-radius: 2px;
    animation: bar 0.6s ease-in-out infinite alternate;
  }
  .bars span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .bars span:nth-child(2) { height: 16px; animation-delay: 0.15s; }
  .bars span:nth-child(3) { height: 10px; animation-delay: 0.3s; }
  @keyframes bar {
    from { transform: scaleY(0.4); }
    to { transform: scaleY(1); }
  }

  .track-info { min-width: 0; }
  .track-name {
    font-weight: 600;
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.2rem;
  }
  .track-item.active .track-name { color: var(--accent); }
  .track-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    gap: 0.75rem;
  }
  .tag-ext {
    background: rgba(255,255,255,0.06);
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .track-actions {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .track-duration {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 40px;
    text-align: right;
  }
  .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.15s;
  }
  .track-item:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { color: #ff4444; background: rgba(255,68,68,0.1); }

  /* STICKY PLAYER */
  .sticky-player {
    position: sticky;
    top: 80px;
    height: fit-content;
  }

  .player-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .player-art {
    width: 100%;
    aspect-ratio: 1;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    position: relative;
    overflow: hidden;
  }
  .player-art::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 70%, rgba(232,255,60,0.08), transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(255,60,240,0.06), transparent 50%);
  }

  .vinyl {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: 
      radial-gradient(circle at 50% 50%, #1a1a1a 20%, transparent 21%),
      repeating-conic-gradient(#1a1a1a 0deg, #222 2deg, #1a1a1a 4deg);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: animation 0.3s;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
  }
  .vinyl.spinning {
    animation: spin 4s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .vinyl-center {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(232,255,60,0.5);
  }

  .player-body { padding: 1.25rem; }

  .now-playing-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .now-playing-title {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .now-playing-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }

  /* PROGRESS */
  .progress-wrap {
    margin-bottom: 0.5rem;
  }
  .progress-bar-container {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    margin-bottom: 0.4rem;
  }
  .progress-bar-container:hover { height: 6px; }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    width: 0%;
    transition: width 0.1s linear;
    pointer-events: none;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(232,255,60,0.6);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .progress-bar-container:hover .progress-fill::after { opacity: 1; }
  .time-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
  }

  /* TRANSPORT CONTROLS */
  .transport {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin: 1rem 0;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0.5rem;
    border-radius: 8px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
  }
  .ctrl-btn:hover { color: var(--accent); background: rgba(232,255,60,0.08); }
  .ctrl-btn.active { color: var(--accent); }

  .play-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 0 20px rgba(232,255,60,0.3);
  }
  .play-btn:hover { transform: scale(1.08); box-shadow: 0 0 30px rgba(232,255,60,0.5); }
  .play-btn:active { transform: scale(0.96); }

  /* VOLUME */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }
  .volume-icon { font-size: 0.9rem; color: var(--muted); cursor: pointer; }
  .volume-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .volume-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    width: 28px;
    text-align: right;
  }

  /* BOTTOM MINI PLAYER */
  .mini-player {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    background: rgba(17,17,24,0.95);
    backdrop-filter: blur(24px);
    border-top: 1px solid var(--border);
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .mini-player.visible { transform: translateY(0); }

  .mini-info { flex: 1; min-width: 0; }
  .mini-title {
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mini-sub { font-size: 0.7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .mini-progress {
    flex: 2;
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
  }
  .mini-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    pointer-events: none;
    transition: width 0.1s linear;
  }

  .mini-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .mini-play {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
  }
  .mini-play:hover { transform: scale(1.1); }
  .mini-skip {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.3rem;
    transition: color 0.15s;
  }
  .mini-skip:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">AUDIO <span>VAULT</span></div>
  <div class="header-right">
    <span class="track-count" id="trackCountLabel">0 pistes</span>
  </div>
</header>

<div class="upload-zone" id="uploadZone">
  <input type="file" id="fileInput" multiple accept="audio/*"/>
  <span class="upload-icon">🎵</span>
  <h2>Glisse tes fichiers audio ici</h2>
  <p>ou clique pour choisir des fichiers</p>
  <div class="formats">
    <span class="format-tag">MP3</span>
    <span class="format-tag">WAV</span>
    <span class="format-tag">OGG</span>
    <span class="format-tag">FLAC</span>
    <span class="format-tag">AAC</span>
    <span class="format-tag">M4A</span>
    <span class="format-tag">OPUS</span>
  </div>
</div>

<div class="controls-bar">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Rechercher une piste…"/>
  </div>
  <button class="sort-btn" id="sortBtn">⇅ Trier A–Z</button>
  <button class="shuffle-btn" id="shuffleBtn">⇌ Mélanger</button>
  <button class="clear-btn" id="clearBtn">✕ Tout effacer</button>
</div>

<div class="main">
  <div>
    <div class="track-list" id="trackList">
      <div class="empty-state" id="emptyState">
        <div class="big-icon">🎙️</div>
        <h3>Aucune piste chargée</h3>
        <p>Glisse des fichiers audio ou utilise le bouton ci-dessus</p>
      </div>
    </div>
  </div>

  <div class="sticky-player">
    <div class="player-card">
      <div class="player-art">
        <div class="vinyl" id="vinyl">
          <div class="vinyl-center"></div>
        </div>
      </div>
      <div class="player-body">
        <div class="now-playing-label">EN LECTURE</div>
        <div class="now-playing-title" id="playerTitle">—</div>
        <div class="now-playing-sub" id="playerSub">Aucune piste sélectionnée</div>

        <div class="progress-wrap">
          <div class="progress-bar-container" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="time-labels">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>

        <div class="transport">
          <button class="ctrl-btn" id="repeatBtn" title="Répéter">⟳</button>
          <button class="ctrl-btn" id="prevBtn" title="Précédent">⏮</button>
          <button class="play-btn" id="playBtn">▶</button>
          <button class="ctrl-btn" id="nextBtn" title="Suivant">⏭</button>
          <button class="ctrl-btn" id="shuffleBtn2" title="Aléatoire">⇌</button>
        </div>

        <div class="volume-row">
          <span class="volume-icon" id="muteBtn">🔊</span>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80"/>
          <span class="volume-val" id="volumeVal">80%</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MINI PLAYER (bottom bar) -->
<div class="mini-player" id="miniPlayer">
  <div class="mini-info">
    <div class="mini-title" id="miniTitle">—</div>
    <div class="mini-sub" id="miniSub">—</div>
  </div>
  <div class="mini-progress" id="miniProgress">
    <div class="mini-progress-fill" id="miniProgressFill"></div>
  </div>
  <div class="mini-controls">
    <button class="mini-skip" id="miniPrev">⏮</button>
    <button class="mini-play" id="miniPlay">▶</button>
    <button class="mini-skip" id="miniNext">⏭</button>
  </div>
</div>

<audio id="audioEl"></audio>

<script>
  const audio = document.getElementById('audioEl');
  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');
  const trackListEl = document.getElementById('trackList');
  const emptyState = document.getElementById('emptyState');
  const searchInput = document.getElementById('searchInput');
  const trackCountLabel = document.getElementById('trackCountLabel');

  // Player UI
  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const repeatBtn = document.getElementById('repeatBtn');
  const shuffleBtn2 = document.getElementById('shuffleBtn2');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const currentTimeEl = document.getElementById('currentTime');
  const totalTimeEl = document.getElementById('totalTime');
  const playerTitle = document.getElementById('playerTitle');
  const playerSub = document.getElementById('playerSub');
  const volumeSlider = document.getElementById('volumeSlider');
  const volumeVal = document.getElementById('volumeVal');
  const muteBtn = document.getElementById('muteBtn');
  const vinyl = document.getElementById('vinyl');

  // Mini player
  const miniPlayer = document.getElementById('miniPlayer');
  const miniTitle = document.getElementById('miniTitle');
  const miniSub = document.getElementById('miniSub');
  const miniPlay = document.getElementById('miniPlay');
  const miniPrev = document.getElementById('miniPrev');
  const miniNext = document.getElementById('miniNext');
  const miniProgressFill = document.getElementById('miniProgressFill');
  const miniProgress = document.getElementById('miniProgress');

  let tracks = [];
  let currentIndex = -1;
  let isPlaying = false;
  let isRepeat = false;
  let isShuffle = false;
  let isMuted = false;
  let prevVolume = 80;
  let objectURLs = [];
  let filteredIndices = null;

  // Utility
  function formatTime(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function getExt(name) {
    return name.split('.').pop().toUpperCase();
  }

  function formatSize(bytes) {
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  // Load files
  function addFiles(files) {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('audio/') && !['mp3','wav','ogg','flac','aac','m4a','opus','wma'].includes(getExt(file.name).toLowerCase())) return;
      // Avoid duplicates
      if (tracks.some(t => t.name === file.name && t.size === file.size)) return;
      const url = URL.createObjectURL(file);
      objectURLs.push(url);
      tracks.push({ name: file.name.replace(/\.[^/.]+$/, ''), ext: getExt(file.name), size: file.size, url, index: tracks.length });
    });
    renderTracks();
    updateCount();
  }

  function renderTracks() {
    const query = searchInput.value.toLowerCase();
    let list = tracks;
    if (query) list = tracks.filter(t => t.name.toLowerCase().includes(query));

    trackListEl.innerHTML = '';
    if (list.length === 0) {
      trackListEl.appendChild(emptyState);
      emptyState.style.display = '';
      return;
    }
    emptyState.style.display = 'none';

    list.forEach((track, i) => {
      const item = document.createElement('div');
      item.className = 'track-item' + (track.index === currentIndex ? ' active' + (isPlaying ? ' is-playing' : '') : '');
      item.dataset.index = track.index;
      item.style.animationDelay = `${i * 0.04}s`;
      item.innerHTML = `
        <div class="track-num">
          <span class="num-label">${track.index + 1}</span>
          <div class="bars">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="track-info">
          <div class="track-name">${track.name}</div>
          <div class="track-meta">
            <span class="tag-ext">${track.ext}</span>
            <span>${formatSize(track.size)}</span>
            <span class="track-dur-${track.index}">—</span>
          </div>
        </div>
        <div class="track-actions">
          <span class="track-duration" id="dur-${track.index}">—</span>
          <button class="remove-btn" title="Supprimer">✕</button>
        </div>
      `;
      item.querySelector('.remove-btn').addEventListener('click', e => {
        e.stopPropagation();
        removeTrack(track.index);
      });
      item.addEventListener('click', () => playTrack(track.index));
      trackListEl.appendChild(item);

      // Load duration
      loadDuration(track);
    });
  }

  function loadDuration(track) {
    const tmp = new Audio(track.url);
    tmp.addEventListener('loadedmetadata', () => {
      track.duration = tmp.duration;
      const el = document.getElementById(`dur-${track.index}`);
      if (el) el.textContent = formatTime(tmp.duration);
    });
  }

  function updateCount() {
    trackCountLabel.textContent = `${tracks.length} piste${tracks.length !== 1 ? 's' : ''}`;
  }

  function removeTrack(idx) {
    const t = tracks[idx];
    if (t) URL.revokeObjectURL(t.url);
    tracks.splice(tracks.findIndex(x => x.index === idx), 1);
    // re-index
    tracks.forEach((t, i) => t.index = i);
    if (currentIndex === idx) {
      audio.pause();
      audio.src = '';
      currentIndex = -1;
      isPlaying = false;
      updatePlayerUI();
      miniPlayer.classList.remove('visible');
      vinyl.classList.remove('spinning');
    } else if (currentIndex > idx) {
      currentIndex--;
    }
    renderTracks();
    updateCount();
  }

  function playTrack(idx) {
    if (idx < 0 || idx >= tracks.length) return;
    currentIndex = idx;
    const track = tracks[idx];
    audio.src = track.url;
    audio.volume = volumeSlider.value / 100;
    audio.play();
    isPlaying = true;
    updatePlayerUI();
    renderTracks();
    miniPlayer.classList.add('visible');
    vinyl.classList.add('spinning');
  }

  function togglePlay() {
    if (currentIndex === -1) {
      if (tracks.length > 0) playTrack(0);
      return;
    }
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      vinyl.classList.remove('spinning');
    } else {
      audio.play();
      isPlaying = true;
      vinyl.classList.add('spinning');
    }
    updatePlayerUI();
    renderTracks();
  }

  function playNext() {
    if (tracks.length === 0) return;
    let next;
    if (isShuffle) {
      next = Math.floor(Math.random() * tracks.length);
    } else {
      next = (currentIndex + 1) % tracks.length;
    }
    playTrack(next);
  }

  function playPrev() {
    if (tracks.length === 0) return;
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    let prev = (currentIndex - 1 + tracks.length) % tracks.length;
    playTrack(prev);
  }

  function updatePlayerUI() {
    if (currentIndex === -1) {
      playerTitle.textContent = '—';
      playerSub.textContent = 'Aucune piste sélectionnée';
      playBtn.textContent = '▶';
      miniPlay.textContent = '▶';
      return;
    }
    const t = tracks[currentIndex];
    playerTitle.textContent = t.name;
    playerSub.textContent = `${t.ext} · ${formatSize(t.size)}`;
    miniTitle.textContent = t.name;
    miniSub.textContent = `${t.ext}`;
    playBtn.textContent = isPlaying ? '⏸' : '▶';
    miniPlay.textContent = isPlaying ? '⏸' : '▶';
  }

  // Audio events
  audio.addEventListener('timeupdate', () => {
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    progressFill.style.width = pct + '%';
    miniProgressFill.style.width = pct + '%';
    currentTimeEl.textContent = formatTime(audio.currentTime);
    totalTimeEl.textContent = formatTime(audio.duration);
  });

  audio.addEventListener('ended', () => {
    if (isRepeat) {
      audio.currentTime = 0;
      audio.play();
    } else {
      playNext();
    }
  });

  audio.addEventListener('pause', () => {
    isPlaying = false;
    vinyl.classList.remove('spinning');
    updatePlayerUI();
    renderTracks();
  });

  audio.addEventListener('play', () => {
    isPlaying = true;
    vinyl.classList.add('spinning');
    updatePlayerUI();
    renderTracks();
  });

  // Progress bar click
  progressBar.addEventListener('click', e => {
    if (!audio.duration) return;
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  miniProgress.addEventListener('click', e => {
    if (!audio.duration) return;
    const rect = miniProgress.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });

  // Transport
  playBtn.addEventListener('click', togglePlay);
  prevBtn.addEventListener('click', playPrev);
  nextBtn.addEventListener('click', playNext);
  miniPlay.addEventListener('click', togglePlay);
  miniPrev.addEventListener('click', playPrev);
  miniNext.addEventListener('click', playNext);

  repeatBtn.addEventListener('click', () => {
    isRepeat = !isRepeat;
    repeatBtn.classList.toggle('active', isRepeat);
  });

  shuffleBtn2.addEventListener('click', () => {
    isShuffle = !isShuffle;
    shuffleBtn2.classList.toggle('active', isShuffle);
  });

  // Volume
  volumeSlider.addEventListener('input', () => {
    audio.volume = volumeSlider.value / 100;
    volumeVal.textContent = volumeSlider.value + '%';
    isMuted = false;
    muteBtn.textContent = volumeSlider.value > 50 ? '🔊' : volumeSlider.value > 10 ? '🔉' : '🔇';
  });

  muteBtn.addEventListener('click', () => {
    if (isMuted) {
      audio.volume = prevVolume / 100;
      volumeSlider.value = prevVolume;
      volumeVal.textContent = prevVolume + '%';
      muteBtn.textContent = '🔊';
      isMuted = false;
    } else {
      prevVolume = volumeSlider.value;
      audio.volume = 0;
      volumeSlider.value = 0;
      volumeVal.textContent = '0%';
      muteBtn.textContent = '🔇';
      isMuted = true;
    }
  });

  // Upload
  uploadZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => addFiles(e.target.files));

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });

  // Search
  searchInput.addEventListener('input', renderTracks);

  // Sort
  document.getElementById('sortBtn').addEventListener('click', () => {
    tracks.sort((a, b) => a.name.localeCompare(b.name));
    tracks.forEach((t, i) => t.index = i);
    if (currentIndex !== -1) {
      const playingName = tracks.find((_, i) => i === currentIndex)?.name;
      currentIndex = tracks.findIndex(t => t.name === playingName);
    }
    renderTracks();
  });

  // Shuffle list
  document.getElementById('shuffleBtn').addEventListener('click', () => {
    for (let i = tracks.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [tracks[i], tracks[j]] = [tracks[j], tracks[i]];
    }
    tracks.forEach((t, i) => t.index = i);
    currentIndex = -1;
    renderTracks();
  });

  // Clear
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (tracks.length === 0) return;
    if (!confirm('Effacer toutes les pistes ?')) return;
    objectURLs.forEach(u => URL.revokeObjectURL(u));
    objectURLs = [];
    tracks = [];
    currentIndex = -1;
    isPlaying = false;
    audio.pause();
    audio.src = '';
    vinyl.classList.remove('spinning');
    miniPlayer.classList.remove('visible');
    renderTracks();
    updateCount();
    updatePlayerUI();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowRight') { audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); }
    if (e.code === 'ArrowLeft') { audio.currentTime = Math.max(0, audio.currentTime - 5); }
    if (e.code === 'ArrowUp') { volumeSlider.value = Math.min(100, +volumeSlider.value + 5); volumeSlider.dispatchEvent(new Event('input')); }
    if (e.code === 'ArrowDown') { volumeSlider.value = Math.max(0, +volumeSlider.value - 5); volumeSlider.dispatchEvent(new Event('input')); }
    if (e.code === 'KeyN') playNext();
    if (e.code === 'KeyP') playPrev();
  });

  // Init
  audio.volume = 0.8;
  renderTracks();
  updateCount();
</script>
</body>
</html>
